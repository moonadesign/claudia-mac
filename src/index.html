<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Claudia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&display=swap">
    <link rel="stylesheet" href="minterface.css">
    <link rel="stylesheet" href="app.css">
    <script crossorigin="anonymous" defer src="https://kit.fontawesome.com/46660cdeff.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-enterprise@35.2.0/dist/ag-grid-enterprise.min.js"></script>
    <script defer src="renderer.js"></script>
  </head>
  <body>
    <div id="app">
      <aside id="side">
        <div id="side-drag"></div>
        <div class="brand">Claudia <div class="spinner" id="spinner"></div></div>
        <nav id="side-nav">
          <div class="nav-group">
            <a class="nav-button active" data-page="home">
              <i class="fa-regular fa-house"></i>
              <span>Home</span>
            </a>
            <a class="nav-button" data-page="sessions">
              <i class="fa-regular fa-messages"></i>
              <span>Sessions</span>
              <span class="nav-count" id="sessions-count"></span>
            </a>
            <a class="nav-button" data-page="memories">
              <i class="fa-regular fa-brain"></i>
              <span>Memories</span>
              <span class="nav-count" id="memories-count"></span>
            </a>
            <a class="nav-button" data-page="rules">
              <i class="fa-regular fa-scroll"></i>
              <span>Rules</span>
              <span class="nav-count" id="rules-count"></span>
            </a>
            <a class="nav-button" data-page="settings-page">
              <i class="fa-regular fa-sliders"></i>
              <span>Settings</span>
              <span class="nav-count" id="settings-page-count"></span>
            </a>
            <a class="nav-button" data-page="tools">
              <i class="fa-regular fa-wrench"></i>
              <span>Tools</span>
              <span class="nav-count" id="tools-count"></span>
            </a>
            <a class="nav-button" data-page="usage">
              <i class="fa-regular fa-chart-bar"></i>
              <span>Usage</span>
              <span class="nav-count" id="usage-plan-pct"></span>
            </a>
            <a class="nav-button" data-page="goodies">
              <i class="fa-regular fa-gift"></i>
              <span>Goodies</span>
            </a>
          </div>
        </nav>
        <a class="nav-button" id="mode"><i id="mode-icon"></i><span id="mode-label"></span></a>
        <a class="nav-button" id="sidebar-toggle">
          <i class="fa-regular fa-sidebar"></i>
        </a>
      </aside>
      <main id="main">
        <section class="page active" id="home">
          <div id="home-grid">
            <div class="home-card home-card-hero home-card-today" id="card-today">
              <div class="home-card-label">Today</div>
              <div class="home-card-big" id="today-big"></div>
              <div class="home-card-sub" id="today-sub"></div>
            </div>
            <div class="home-card glass home-card-plan" id="card-plan" data-nav="usage">
              <div class="home-card-label">Plan</div>
              <div class="home-card-big" id="plan-big">...</div>
              <div class="home-card-sub" id="plan-sub">Loading</div>
            </div>
            <div class="home-card glass home-card-sessions" id="card-sessions" data-nav="sessions">
              <div class="home-card-label">Sessions</div>
              <div class="home-card-big" id="sessions-big"></div>
              <div class="home-card-sub" id="sessions-sub"></div>
            </div>
            <div class="home-card glass home-card-usage" id="card-stats" data-nav="usage">
              <div class="home-card-label">Usage</div>
              <div class="home-card-big" id="usage-big"></div>
              <div class="home-card-sub" id="usage-sub"></div>
            </div>
            <div class="home-card glass home-card-memories" id="card-memories" data-nav="memories">
              <div class="home-card-label">Memories</div>
              <div class="home-card-big" id="memories-big"></div>
              <div class="home-card-sub" id="memories-sub"></div>
            </div>
            <div class="home-card glass home-card-rules" id="card-rules" data-nav="rules">
              <div class="home-card-label">Rules</div>
              <div class="home-card-big" id="rules-big"></div>
              <div class="home-card-sub" id="rules-sub"></div>
            </div>
            <div class="home-card glass home-card-settings" id="card-settings" data-nav="settings-page">
              <div class="home-card-label">Settings</div>
              <div class="home-card-big" id="settings-big"></div>
              <div class="home-card-sub" id="settings-sub"></div>
            </div>
            <div class="home-card glass home-card-tools" id="card-tools" data-nav="tools">
              <div class="home-card-label">Tools</div>
              <div class="home-card-big" id="tools-big"></div>
              <div class="home-card-sub" id="tools-sub"></div>
            </div>
          </div>
        </section>
        <section class="page" id="goodies">
          <div class="page-header"><i class="fa-regular fa-gift"></i><strong>Goodies</strong></div>
          <div class="goodies-list">
            <label class="goodies-item">
              <div class="goodies-info">
                <div class="goodies-name">Menu Bar</div>
                <div class="goodies-desc">Show today's cost and tokens in the system menu bar</div>
              </div>
              <input type="checkbox" id="goodie-tray">
            </label>
            <label class="goodies-item">
              <div class="goodies-info">
                <div class="goodies-name">Floating Widget</div>
                <div class="goodies-desc">Always-on-top mini dashboard with today's stats</div>
              </div>
              <input type="checkbox" id="goodie-widget">
            </label>
            <label class="goodies-item">
              <div class="goodies-info">
                <div class="goodies-name">Plan Refresh</div>
                <div class="goodies-desc">Auto-refresh plan usage from Claude CLI</div>
              </div>
              <select id="goodie-plan-refresh">
                <option value="0">Off</option>
                <option value="5">5 min</option>
                <option value="10">10 min</option>
                <option value="15">15 min</option>
                <option value="30">30 min</option>
              </select>
            </label>
          </div>
        </section>
        <template id="grid-page-template">
          <section class="page">
            <div class="page-header"><i></i><strong></strong><div class="fill"></div><button class="button outline" data-action="filter"><i class="fa-regular fa-bars-filter"></i> Filter</button><button class="button outline" data-action="columns"><i class="fa-regular fa-table-columns"></i> Columns</button></div>
            <div class="grid-container"></div>
          </section>
        </template>
      </main>
    </div>
  </body>
</html>
