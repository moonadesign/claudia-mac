name: Release
on:
  push:
    tags: ['v*']
jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run package
      - name: Create DMG
        run: |
          APP="out/Claudia-darwin-$(uname -m)/Claudia.app"
          DMG="out/Claudia-${GITHUB_REF_NAME}-$(uname -m).dmg"
          TMP=$(mktemp -d)
          cp -R "$APP" "$TMP/"
          ln -s /Applications "$TMP/Applications"
          hdiutil create -volname Claudia -srcfolder "$TMP" -ov -format UDZO "$DMG"
          rm -rf "$TMP"
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCH=$(uname -m)
          gh release create "$GITHUB_REF_NAME" \
            --title "Claudia $GITHUB_REF_NAME" \
            --generate-notes \
            "out/Claudia-${GITHUB_REF_NAME}-${ARCH}.dmg"
